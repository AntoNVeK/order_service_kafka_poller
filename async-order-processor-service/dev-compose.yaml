services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: orders
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
    ports:
      - "5432:5432"
    mem_limit: 256mb
    cpus: "1"

  external-stub:
    image: external-http-stub-service:latest
    environment:
      SERVER_PORT: 8081
      STUB_INVENTORY_REJECT_ENABLED: true
      STUB_INVENTORY_REJECT_PROBABILITY: 0.5
      STUB_PRICING_EXCEPTION_ENABLED: true
      STUB_PRICING_EXCEPTION_PROBABILITY: 0.3
      STUB_SHIPPING_EXCEPTION_ENABLED: true
      STUB_SHIPPING_EXCEPTION_PROBABILITY: 0.3
      SPRING_THREADS_VIRTUAL_ENABLED: false
    ports:
      - "8081:8081"
    mem_limit: 256mb
    cpus: "1"

  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    mem_limit: 512m
    cpus: "1"

  email-service:
    build: ./email-notification-service
    ports:
      - "8082:8082"
    depends_on:
      - kafka
      - mailhog
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      MAIL_HOST: mailhog
      MAIL_PORT: 1025
