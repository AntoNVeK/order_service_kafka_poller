spring:
  application:
    name: order-processor-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:not-set}
    username: ${SPRING_DATASOURCE_USERNAME:not-set}
    password: ${SPRING_DATASOURCE_PASSWORD:not-set}
    hikari:
      maximum-pool-size: 100
  liquibase:
    change-log: classpath:/db/changelog/changelog-master.yaml
  docker:
    compose:
      file: dev-compose.yaml
      lifecycle-management: start-and-stop   # поднимает при старте, останавливает при завершении
      start:
        command: up                         # использовать `docker compose up`
        arguments: --force-recreate         # ВСЕГДА пересоздавать контейнеры
      stop:
        command: down                       # полноценно гасит окружение
  threads:
    virtual:
      enabled: ${SPRING_THREADS_VIRTUAL_ENABLED:false} # каждый запрос в своем виртуальном потоке

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
    consumer:
      group-id: email-notification-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping:
          "order.completed:dev.kornienko.order_processor_service.event.OrderCompletedEvent,\
                   order.failed:dev.kornienko.order_processor_service.event.OrderFailedEvent"



clients:
  stub:
    base-url: ${STUB_BASE_URL:http://localhost:8081/order-stub}
    read-timeout: ${STUB_BASE_READ_TIMEOUT:30s}
    connect-timeout: ${STUB_BASE_CONNECT_TIMEOUT:30s}

task-execution:
  poller:
    poll-interval-ms: ${TASK_EXEC_POLL_INTERVAL_MS:1000}
    batch-size: ${TASK_EXEC_POLL_BATCH_SIZE:10}
    retry-delay: ${TASK_EXEC_POLL_RETRY_DELAY:30s}
  dispatcher:
    max-attempts: ${TASK_EXEC_DISPATCHER_MAX_ATTEMPTS:10}
    retry-delay: ${TASK_EXEC_DISPATCHER_RETRY_DELAY:1s}
    thread-pool-size: ${TASK_EXEC_DISPATCHER_THREAD_POOL_SIZE:10}
  external-http:
    thread-pool-size: ${TASK_EXEC_EXTERNAL_HTTP_THREAD_POOL_SIZE:16}


server:
  tomcat:
    max-connections: 10000 # максимальное кол-во открытых сокетов (коннектов) (дефолт - 8192)
    threads:
      max-queue-capacity: 1000 # размер очереди запросов (дефолт - Integer.MAX_VALUE)
      min-spare: 5 # минимальное кол-во потоков (нативных) в пуле томката (дефолт - 10)
      max: 10 # максимальное кол-во потоков (нативных) в пуле томката (дефолт - 200)

# поменять настройки swagger'а
springdoc:
  api-docs:
    path: /v3/api/docs
  swagger-ui:
    path: /swagger-ui.html
